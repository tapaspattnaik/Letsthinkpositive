<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer disc -->
  <circle cx="32" cy="34" r="18" fill="#2D9B8A"/>
  <!-- Inner deep disc -->
  <circle cx="32" cy="34" r="13" fill="#1A6B6B"/>
  <!-- Rising sun arc -->
  <path d="M25 35 Q32 27 39 35" fill="none" stroke="#E8A020" stroke-width="2.5" stroke-linecap="round"/>
