  <line x1="32" y1="16" x2="32" y2="8" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="7"  r="1.5" fill="#E8A020"/>
  <!-- Growth strokes side -->
  <line x1="26" y1="18" x2="23" y2="10" stroke="#E8A020" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="22" cy="9"  r="1.2" fill="#F5C96A"/>
  <line x1="38" y1="18" x2="41" y2="10" stroke="#E8A020" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="42" cy="9"  r="1.2" fill="#F5C96A"/>
  <!-- Root arc -->
  <path d="M22 48 Q32 54 42 48" fill="none" stroke="#2D9B8A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Root dots -->
  <circle cx="24" cy="51" r="1.2" fill="#2D9B8A" opacity="0.7"/>
  <circle cx="32" cy="53" r="1.2" fill="#2D9B8A" opacity="0.7"/>
  <circle cx="40" cy="51" r="1.2" fill="#2D9B8A" opacity="0.7"/>
